<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gelt Code</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChEIqqIPJPqlGoobvAXPRYCFoTpGssVR0",
    authDomain: "gelt-3cb09.firebaseapp.com",
    projectId: "gelt-3cb09",
    storageBucket: "gelt-3cb09.firebasestorage.app",
    messagingSenderId: "66252986689",
    appId: "1:66252986689:web:636a32eca15440845629c0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._fb = {
    async saveCloud(username, data) {
      try {
        const key = username.toLowerCase().replace(/[^a-z0-9_.]/g, '');
        await setDoc(doc(db, 'saves', key), { data: JSON.stringify(data), updatedAt: Date.now() });
        return true;
      } catch(e) { console.error('FB save:', e); return false; }
    },
    async loadCloud(username) {
      try {
        const key = username.toLowerCase().replace(/[^a-z0-9_.]/g, '');
        const snap = await getDoc(doc(db, 'saves', key));
        if (snap.exists()) return JSON.parse(snap.data().data);
        return null;
      } catch(e) { console.error('FB load:', e); return null; }
    },
    async savePwd(username, pwdHash) {
      try {
        const key = username.toLowerCase().replace(/[^a-z0-9_.]/g, '');
        await setDoc(doc(db, 'passwords', key), { pwdHash, updatedAt: Date.now() });
        return true;
      } catch(e) { console.error('FB pwd:', e); return false; }
    },
    async checkPwd(username, pwdHash) {
      try {
        const key = username.toLowerCase().replace(/[^a-z0-9_.]/g, '');
        const snap = await getDoc(doc(db, 'passwords', key));
        if (!snap.exists()) return 'not_found';
        return snap.data().pwdHash === pwdHash ? 'ok' : 'wrong';
      } catch(e) { return 'error'; }
    },
    async usernameExists(username) {
      try {
        const key = username.toLowerCase().replace(/[^a-z0-9_.]/g, '');
        const snap = await getDoc(doc(db, 'passwords', key));
        return snap.exists();
      } catch(e) { return false; }
    }
  };
  window._fbReady = true;
  window.dispatchEvent(new Event('fbready'));
</script>

<style>
  :root {
    --bg: #0F1419;
    --surface: #1A222C;
    --surface-light: #252F3B;
    --primary: #58CC02;
    --primary-dark: #46A302;
    --secondary: #1CB0F6;
    --danger: #FF4B4B;
    --text: #FFFFFF;
    --text-muted: #8B95A1;
    --gold: #FFC800;
    --purple: #9B59B6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #000; color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
  
  .app {
    width: 100%; max-width: 430px; height: 100%;
    background: var(--bg); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* TOP BAR */
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--bg); z-index: 20; }
  .stat-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); padding: 6px 12px; border-radius: 12px; font-weight: 800; font-size: 15px; }
  .hearts { color: var(--danger); }
  .gems { color: var(--gold); }
  
  /* CONTENT & SCREENS */
  .content { flex: 1; overflow-y: auto; position: relative; }
  .screen { display: none; padding: 20px; min-height: 100%; }
  .screen.active { display: block; animation: fadeIn 0.22s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* PATH */
  .path { display: flex; flex-direction: column; align-items: center; gap: 28px; padding-top: 20px; }
  .node {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer; position: relative;
    transition: transform 0.1s, border-width 0.1s;
  }
  .node:active { transform: scale(0.95);}
  .node.done { background: var(--primary); box-shadow: 0 8px 0 var(--primary-dark); color: white; }
  .node.active { background: var(--secondary); box-shadow: 0 8px 0 #1899D6; color: white; animation: pulse 2s infinite; }
  .node.locked { background: var(--surface-light); color: var(--text-muted); cursor: not-allowed; box-shadow: 0 8px 0 #151A21; }
  .node.locked:active { transform: none; }
  .node.trophy-node { background: linear-gradient(135deg,#ffc800,#ff8c00); box-shadow: 0 8px 0 #b85c00; color: white; font-size: 32px; }
  .node.trophy-node.locked { background: var(--surface-light); color: var(--text-muted); box-shadow: 0 8px 0 #151A21; }
  .node:nth-child(odd) { margin-right: 50px; }
  .node:nth-child(even) { margin-left: 50px; }
  @keyframes pulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* LESSON */
  .lesson-head { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; }
  .close-btn { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; padding: 4px; line-height: 1; }
  .close-btn:hover { color: var(--text); }
  .progress-track { flex: 1; height: 16px; background: var(--surface-light); border-radius: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; border-radius: 8px; }
  .hearts-lesson { color: var(--danger); font-weight: 800; font-size: 18px; white-space: nowrap; }

  .mascot-row { display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-end; }
  .golem-svg { width: 64px; height: 64px; flex-shrink: 0; filter: drop-shadow(0 4px 12px rgba(28, 176, 246, 0.5)); }
  .bubble { background: var(--surface); padding: 14px; border-radius: 16px; border: 2px solid var(--surface-light); font-size: 15px; line-height: 1.4; position: relative; }
  .bubble::after { content: ''; position: absolute; left: -8px; bottom: 18px; border-width: 8px 8px 8px 0; border-style: solid; border-color: transparent var(--surface) transparent transparent; }

  .q-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
  .code-box { background: #000; padding: 14px; border-radius: 12px; font-family: 'Consolas', monospace; color: var(--primary); margin-bottom: 20px; font-size: 15px; line-height: 1.5; border: 1px solid var(--surface-light); white-space: pre-wrap; }
  
  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt { background: var(--surface); border: 2px solid var(--surface-light); border-bottom-width: 4px; padding: 16px; border-radius: 16px; font-size: 16px; color: var(--text); text-align: left; cursor: pointer; transition: all 0.1s; width: 100%; }
  .opt:active { transform: translateY(2px); border-bottom-width: 2px; }
  .opt.sel { border-color: var(--secondary); background: rgba(28, 176, 246, 0.1); }
  .opt.ok { border-color: var(--primary); background: rgba(88, 204, 2, 0.1); }
  .opt.err { border-color: var(--danger); background: rgba(255, 75, 75, 0.1); }
  .opts.answered .opt { pointer-events: none; }

  /* TYPING QUESTION */
  .type-input-wrap { position: relative; margin-bottom: 4px; }
  .type-input {
    width: 100%; background: var(--surface); border: 2px solid var(--surface-light);
    border-radius: 14px; padding: 14px 16px; color: var(--text);
    font-size: 16px; font-family: 'Consolas', monospace; font-weight: 700;
    outline: none; transition: border-color 0.2s; caret-color: var(--secondary);
    min-height: 56px; resize: none; line-height: 1.5;
  }
  .type-input:focus { border-color: var(--secondary); }
  .type-input.ok { border-color: var(--primary); background: rgba(88,204,2,0.07); }
  .type-input.err { border-color: var(--danger); background: rgba(255,75,75,0.07); }
  .hint-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .hint-chip {
    background: var(--surface); border: 2px solid var(--surface-light); border-bottom-width: 3px;
    padding: 8px 14px; border-radius: 10px; font-size: 14px; font-family: 'Consolas', monospace;
    color: var(--text); cursor: pointer; transition: all 0.1s; font-weight: 700;
    user-select: none;
  }
  .hint-chip:active { transform: translateY(2px); border-bottom-width: 1px; }
  .hint-chip.used { opacity: 0.3; pointer-events: none; }

  /* ACTION BAR */
  .action { position: sticky; left: 0; right: 0; padding: 16px; display: none; z-index: 20; margin-top: 16px; }
  .action.show { display: block; animation: slideUp 0.25s; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  
  /* BTN */
  .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 17px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.3); font-family: 'Nunito', system-ui, sans-serif; }
  .btn.go { background: var(--primary); color: white; box-shadow: 0 6px 0 var(--primary-dark); }
  .btn.go:hover:not(:disabled) { background: #66e002; }
  .btn.bad { background: var(--danger); color: white; box-shadow: 0 6px 0 #B30000; }
  .btn.trophy-btn { background: linear-gradient(135deg,#ffc800,#ff8c00); color: white; box-shadow: 0 6px 0 #b85c00; }
  .btn:disabled { background: var(--surface-light); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }

  /* ── TROPHY TEST ─────────────────────────────────────────────── */
  #scr-trophy.active { display: flex; flex-direction: column; }
  .trophy-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: linear-gradient(135deg,#2a1a00,#1a1000); border-bottom: 1px solid #3a2a00; }
  .trophy-head-title { font-size: 16px; font-weight: 800; color: var(--gold); flex: 1; text-align: center; }
  .trophy-progress-track { flex: 1; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; overflow: hidden; }
  .trophy-progress-fill { height: 100%; background: linear-gradient(90deg,#ffc800,#ff8c00); width: 0%; transition: width 0.4s; border-radius: 7px; }
  .trophy-content { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .trophy-q-label {
    font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .trophy-q-title { font-size: 19px; font-weight: 700; margin-bottom: 18px; line-height: 1.35; }
  .trophy-result-box { text-align: center; padding: 30px 20px; }
  .trophy-result-box .big-icon { font-size: 72px; margin-bottom: 16px; display: block; animation: bounceIn 0.6s; }
  @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .trophy-result-box h2 { font-size: 26px; font-weight: 900; margin-bottom: 10px; }
  .trophy-result-box p { color: var(--text-muted); line-height: 1.5; font-size: 15px; }
  .score-stars { font-size: 36px; margin: 16px 0; letter-spacing: 4px; }
  .trophy-score-detail { background: var(--surface); border-radius: 14px; padding: 16px; margin: 16px 0; display: flex; justify-content: space-around; }
  .trophy-score-item { text-align: center; }
  .trophy-score-item .ts-val { font-size: 22px; font-weight: 900; }
  .trophy-score-item .ts-lbl { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-top: 2px; }

  /* PROFILE */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { background: var(--surface); padding: 14px; border-radius: 16px; border: 1px solid var(--surface-light); display: flex; align-items: center; gap: 12px; }
  .card .icon { font-size: 24px; }
  .card .val { font-size: 18px; font-weight: 800; }
  .card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

  /* ── PROFILE REDESIGN ─────────────────────────────────── */
  .prof-banner {
    position: relative; margin: -20px -20px 0; padding: 20px 20px 90px;
    overflow: visible;
  }
  .prof-banner-title { font-size: 13px; font-weight: 800; letter-spacing: 1.5px; color: rgba(255,255,255,0.7); margin-bottom: 4px; text-transform: uppercase; margin-left: 10px; }

  /* CHARACTER AVATAR */
  .ava-wrap { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 5; }
  .ava {

  .ava-edit-badge {

  .character-svg { width: 100%; height: 100%; }

  /* TITLE BADGE on profile */
  .title-badge-display {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(255,200,0,0.2), rgba(255,140,0,0.1));

  }
  .title-badge-display.none-title { color: var(--text-muted); background: var(--surface); border-color: var(--surface-light); }

  /* AVATAR MODAL redesign */
  .modal-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 50;

  }

  .modal-sheet {

  }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; text-align: center; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 16px; }
  
  /* Char customizer tabs */
  .char-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .char-tabs::-webkit-scrollbar { display: none; }
  .char-tab {

    cursor: pointer; white-space: nowrap; transition: all 0.15s;
    background: var(--surface-light); color: var(--text-muted); border: none;
  }
  .char-tab.active { background: var(--secondary); color: white; }

  .char-preview-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .char-preview { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid var(--surface-light); background: #111; }

  /* Grid for customization items */
  .custom-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .custom-item {
    aspect-ratio: 1; border-radius: 14px; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: 3px solid transparent;
    transition: all 0.15s; background: var(--surface-light);

  }
  .custom-item:active { transform: scale(0.9); }
  .custom-item.picked { border-color: var(--secondary); background: rgba(28,176,246,0.15); }
  .custom-item .locked-over { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; font-size: 16px; border-radius: 12px; }

  /* EDIT FIELDS */
  .prof-body { padding-top: 64px; }
  .edit-section { margin-bottom: 20px; }
  .edit-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .edit-field {
    width: 100%; background: var(--surface); border: 2px solid var(--surface-light);
    border-radius: 14px; padding: 14px 16px; color: var(--text);

  }
  .edit-field:focus { border-color: var(--secondary); }
  .edit-field::placeholder { color: var(--text-muted); font-weight: 400; }
  .username-row { display: flex; align-items: center; gap: 8px; }
  .username-at { font-size: 18px; font-weight: 800; color: var(--text-muted); padding-top: 2px; }

  .stat-card .s-val { font-size: 16px; font-weight: 800; }
  .stat-card .s-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 2px; }

  /* ── ACHIEVEMENTS ─────────────────────────────────────────── */

  .ach-header p { font-size: 13px; color: var(--text-muted); }
  .ach-section-title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
  .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
  .ach-card {
    background: var(--surface); border: 2px solid var(--surface-light);
    border-radius: 16px; padding: 14px 10px; text-align: center;
    position: relative; transition: all 0.2s; cursor: default;
  }
  .ach-card.unlocked { border-color: var(--gold); background: rgba(255,200,0,0.06); }
  .ach-card.unlocked:active { transform: scale(0.97); }
  .ach-icon { font-size: 32px; margin-bottom: 6px; display: block; }
  .ach-name { font-size: 11px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
  .ach-desc { font-size: 10px; color: var(--text-muted); line-height: 1.3; }
  .ach-card.locked-ach { opacity: 0.45; }
  .ach-card.locked-ach .ach-icon { filter: grayscale(1); }
  .ach-locked-icon { position: absolute; top: 8px; right: 8px; font-size: 10px; color: var(--text-muted); }
  /* Title cards */
  .titles-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
  .title-card {
    background: var(--surface); border: 2px solid var(--surface-light);
    border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .title-card.unlocked { border-color: rgba(255,200,0,0.4); }
  .title-card.equipped { border-color: var(--gold); background: rgba(255,200,0,0.07); }
  .title-card .t-icon { font-size: 28px; flex-shrink: 0; }
  .title-card .t-info { flex: 1; }
  .title-card .t-name { font-size: 15px; font-weight: 800; color: var(--gold); }
  .title-card.locked-title .t-name { color: var(--text-muted); }
  .title-card .t-req { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .title-card .t-equipped { font-size: 11px; font-weight: 800; color: var(--primary); background: rgba(88,204,2,0.1); padding: 3px 10px; border-radius: 10px; }
  .title-card.locked-title { opacity: 0.4; cursor: not-allowed; }

  /* COMPLETION */
  .completion-box { text-align: center; margin-top: 40px; padding: 20px; }
  .completion-box h2 { font-size: 28px
